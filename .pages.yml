# Media configuration for Astro
media:
  - name: images
    label: Images
    input: src/assets/images
    output: /src/assets/images
    rename: safe
    extensions: [png, jpg, webp, svg]
  - name: docs
    label: Documents
    input: src/assets/docs
    output: /src/assets/docs
    categories: [document]

content:
  # --- КОЛЛЕКЦИЯ: КОМАНДА ---
  - name: team
    label: Team
    type: collection
    path: src/content/team
    view:
      fields: [name, role]
    fields:
      - name: name
        label: Full Name
        type: string
      - name: role
        label: Role
        type: string
      - name: avatar
        label: Avatar
        type: image
        options:
          media: images
      - name: bio
        label: Biography
        type: text
      - name: social_links
        label: Social Media
        type: list
        field:
          $ref: "#/components/social_media"
      - name: seo
        $ref: "#/components/seo"

  # --- КОЛЛЕКЦИЯ: БЛОГ ---
  - name: posts
    label: Posts
    type: collection
    path: src/content/blog
    view:
      fields: [title, date, draft]
    fields:
      - name: title
        label: Title
        type: string
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: date
        label: Publish Date
        type: date
      - name: author
        label: Author
        type: reference
        collection: team
        field: name
      - name: cover
        label: Cover Image
        type: image
        options:
          media: images
      - name: body
        label: Body Content
        type: rich-text
        options:
          media: images
          switcher: true
      - name: seo
        $ref: "#/components/seo"

  # --- КОЛЛЕКЦИЯ: ИВЕНТЫ ---
  - name: events
    label: Events
    type: collection
    path: src/content/events
    view:
      fields: [title, date, city]
    fields:
      - name: title
        label: Event Title
        type: string
      - name: date
        label: Event Date
        type: datetime
      - name: city
        label: City
        type: string
      - name: speaker
        label: Speaker / Host
        type: reference
        collection: team
        field: name
      - name: cover
        label: Event Cover
        type: image
        options:
          media: images
      - name: body
        label: Description
        type: rich-text
        options:
          media: images
          switcher: true
      - name: seo
        $ref: "#/components/seo"

# --- ПЕРЕИСПУЛЬЗУЕМЫЕ КОМПОНЕНТЫ ---
components:
  seo:
    type: object
    label: SEO Meta
    fields:
      - name: title
        label: Meta Title
        type: string
      - name: description
        label: Meta Description
        type: text

  social_media:
    type: object
    label: Social Link
    fields:
      - name: title
        label: Platform (e.g. Instagram)
        type: string
      - name: link
        label: URL
        type: string
      - name: icon
        label: Icon Image
        type: image
        options:
          media: images