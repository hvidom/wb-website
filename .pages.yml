media:
  - name: images
    label: Images
    input: src/assets/images
    output: src/assets/images
    rename: safe
    extensions: [png, jpg, webp]

content:
  # COMPONENT: SOCIAL MEDIA PROFILES (Centralized management)
  - name: socials
    label: Social Media
    type: collection
    path: src/data/socials
    format: json
    fields:
      - { name: platform, label: Platform, type: select, options: { values: [LinkedIn, Twitter, GitHub, Instagram, Facebook] } }
      - { name: username, label: Username, type: string }
      - { name: url, label: Profile URL, type: string, required: true }

  # COLLECTION: AUTHORS (Updated with Socials Reference)
  - name: authors
    label: Authors
    type: collection
    path: src/content/authors
    format: md
    fields:
      - { name: name, label: Full Name, type: string, required: true }
      - { name: role, label: Role / Position, type: string }
      - name: socialProfiles
        label: Social Media Links
        type: reference
        list: true # Allows selecting multiple social profiles
        options:
          collection: socials
          field: platform
      - { name: avatar, label: Avatar, type: image, options: { media: images } }
      - { name: body, label: Biography, type: rich-text }

  # COLLECTION: POSTS (Updated with FAQ Blocks)
  - name: posts
    label: Posts
    type: collection
    path: src/content/blog
    format: md
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: author, label: Author, type: reference, options: { collection: authors, field: name } }
      - { name: pubDatetime, label: Publication Date, type: date }
      - name: category
        label: Category
        type: select
        options:
          values: [News, Reviews, Case Studies, Useful Resources]
      - { name: tags, label: Tags, type: string, list: true }
      
      # FAQ SECTION USING BLOCKS
      - name: faq
        label: FAQ Section
        type: block
        fields:
          - name: items
            label: Questions & Answers
            type: object
            list: true
            # Limiting to 5 for your specific requirement
            max: 5
            fields:
              - { name: question, label: Question, type: string }
              - { name: answer, label: Answer, type: text } # text type for longer answers
      
      - { name: description, label: Short Description, type: string }
      - { name: body, label: Content, type: rich-text }

  # COLLECTION: BRANCHES (As per Irish structure)
  - name: branches
    label: Branches
    type: collection
    path: src/content/branches
    format: md
    fields:
      - { name: title, label: Branch Name, type: string, required: true }
      - name: city
        label: City
        type: select
        options:
          values: [Dublin, Cork, Galway, Limerick, Waterford]
      - { name: address, label: Address, type: string }
      - { name: phone, label: Phone Number, type: string }
      - { name: body, label: Description, type: rich-text }

  # COLLECTION: GRANTS
  - name: grants
    label: Grants
    type: collection
    path: src/content/grants
    format: md
    fields:
      - { name: title, label: Grant Title, type: string, required: true }
      - { name: amount, label: Grant Amount, type: string }
      - { name: deadline, label: Application Deadline, type: date }
      - { name: body, label: Detailed Description, type: rich-text }