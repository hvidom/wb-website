# Pages CMS Configuration

content:
  # 1. Коллекция КОМАНДА (Новая)
  - name: team
    label: Команда
    type: collection
    path: content/team
    format: md
    fields:
      - name: name
        label: ФИО
        type: string
      - name: role
        label: Должность
        type: string
      - name: avatar
        label: Аватарка
        type: image
      - name: bio
        label: Описание / Биография
        type: text
      - name: email
        label: Контактный Email
        type: string
      - name: phone
        label: Телефон
        type: string
      # Привязка к компоненту Social Media (массив, если соцсетей несколько)
      - name: social_links
        label: Социальные сети
        type: list
        field:
          $ref: "#/components/social_media"
      - name: seo
        $ref: "#/components/seo"

  # 2. Обновленный Блог
  - name: blog
    label: Блог
    type: collection
    path: content/blog
    format: md
    fields:
      - name: title
        label: Заголовок поста
        type: string
      - name: date
        label: Дата публикации
        type: date
      # ТЕПЕРЬ ЭТО СВЯЗЬ С КОМАНДОЙ
      - name: author
        label: Автор поста
        type: reference
        collection: team
        field: name
      - name: image
        label: Обложка
        type: image
      - name: body
        label: Содержание
        type: rich-text
      - name: seo
        $ref: "#/components/seo"

  # 3. Обновленные Мероприятия
  - name: events
    label: Мероприятия
    type: collection
    path: content/events
    format: md
    fields:
      - name: title
        label: Название события
        type: string
      - name: event_date
        label: Дата проведения
        type: datetime
      # КТО ВЕДЕТ ИВЕНТ (СВЯЗЬ С КОМАНДОЙ)
      - name: speaker
        label: Ведущий / Организатор
        type: reference
        collection: team
        field: name
      - name: location
        label: Локация
        type: string
      - name: branch
        label: Филиал
        type: reference
        collection: branches
        field: title
      - name: description
        label: Описание события
        type: rich-text
      - name: seo
        $ref: "#/components/seo"

  # 4. Филиалы
  - name: branches
    label: Филиалы
    type: collection
    path: content/branches
    format: md
    fields:
      - name: title
        label: Город / Название
        type: string
      # СВЯЗЬ: КТО УПРАВЛЯЕТ ФИЛИАЛОМ
      - name: manager
        label: Руководитель филиала
        type: reference
        collection: team
        field: name
      - name: status
        label: Статус
        type: select
        options:
          - label: Active
            value: active
          - label: Coming Soon
            value: coming_soon
      - name: seo
        $ref: "#/components/seo"

# Компоненты остаются прежними
components:
  seo:
    type: object
    label: SEO
    fields:
      - name: title
        type: string
      - name: description
        type: text

  social_media:
    type: object
    label: social
    fields:
      - name: title
        label: Платформа
        type: string
      - name: link
        label: Ссылка
        type: string
      - name: icon
        label: Иконка
        type: image