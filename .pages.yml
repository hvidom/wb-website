media:
  - name: images
    label: Images
    input: src/assets/images
    output: src/assets/images
    rename: safe
    extensions: [png, jpg, webp]
  - name: docs
    label: Documents
    input: src/media/docs
    output: src/media/docs
    categories: [document]
content:
  - name: events
    label: Events
    type: collection
    path: src/content/events
    view:
      fields: [ title, draft, date, sity ]
    fields:
      - name: cover
        label: Cover image
        type: image
        options:
          media: images
          path: src/assets/images
      - name: body
        label: Body
        type: rich-text
        options:
          media: content_images
          path: src/assets/images
          rename: true
          switcher: true
  - name: posts
    label: Posts
    type: collection
    path: src/content/blog
    view:
      fields: [ title, draft, date ]
    fields:
      - { name: author, label: Author, type: string }
      - { name: pubDatetime, label: Date, type: date }
      - { name: modDatetime, label: Date, type: date }
      - { name: title, label: Title, type: string, required: true }
      - { name: ogImage, label: Title, type: string }
      - { name: slug, label: Slug, type: string }
      - { name: featured, label: Featured, type: boolean }
      - { name: draft, label: Draft, type: boolean }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: description, label: Description, type: string }
      - { name: body, label: Body, type: rich-text }
  - name: about
    label: About page
    type: file
    path: src/pages/about.md
    fields:
      - { name: layout, type: string, hidden: true, default: "../layouts/AboutLayout.astro" }
      - { name: title, label: Title, type: string }
      - { name: body, label: Body, type: rich-text, options: { input: public/assets, output: /assets } }
  - name: authors
    label: Authors
    type: file
    path: src/data/authors.json
    format: json
    list: true
    fields:
      - name: name
        type: string
      - name: email
        type: string
      - name: avatar
        type: image